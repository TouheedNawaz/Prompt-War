<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="description" content="VenueIQ — AI-powered smart venue assistant for large-scale sporting events. Real-time crowd navigation, wait times, and intelligent coordination powered by Google Gemini.">
  <meta name="theme-color" content="#060b17">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta property="og:title" content="VenueIQ — Smart Venue Assistant">
  <meta property="og:description" content="AI-powered crowd navigation and real-time coordination for sporting events.">
  <meta property="og:type" content="website">

  <title>VenueIQ — Smart Venue Assistant</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏟️</text></svg>">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">

  <!-- Material Symbols Rounded (Google Icons) -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

  <!-- App Styles -->
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/heatmap.css">
</head>

<body>

  <!-- ══════════════════════════════════════════════════════════
       APP HEADER
       ══════════════════════════════════════════════════════════ -->
  <header class="app-header" role="banner">
    <div class="header-content">

      <div class="header-brand">
        <span class="brand-icon" aria-hidden="true">🏟️</span>
        <div>
          <div class="brand-name">VenueIQ</div>
          <div class="brand-sub">Smart Venue Assistant</div>
        </div>
      </div>

      <div class="header-right">
        <div class="event-phase-badge" id="event-phase-badge" role="status" aria-live="polite">
          <span class="live-dot" aria-hidden="true"></span>
          Pre-Match
        </div>
        <div class="event-name-header" id="event-name-header">Championship Finals 2026</div>
      </div>

    </div>
  </header>

  <!-- ══════════════════════════════════════════════════════════
       TAB NAVIGATION
       ══════════════════════════════════════════════════════════ -->
  <nav class="tab-nav" role="tablist" aria-label="Main navigation">

    <button class="tab-btn active" id="tab-assistant" data-tab="assistant"
            role="tab" aria-selected="true" aria-controls="panel-assistant">
      <span class="material-symbols-rounded" aria-hidden="true">smart_toy</span>
      <span>AI Assistant</span>
    </button>

    <button class="tab-btn" id="tab-heatmap" data-tab="heatmap"
            role="tab" aria-selected="false" aria-controls="panel-heatmap">
      <span class="material-symbols-rounded" aria-hidden="true">map</span>
      <span>Crowd Map</span>
    </button>

    <button class="tab-btn" id="tab-dashboard" data-tab="dashboard"
            role="tab" aria-selected="false" aria-controls="panel-dashboard">
      <span class="material-symbols-rounded" aria-hidden="true">dashboard</span>
      <span>Live Dashboard</span>
    </button>

  </nav>

  <!-- Alert Banner (injected by dashboard.js) -->
  <div class="alert-banner" id="alert-banner" role="alert" aria-live="assertive" aria-atomic="true"></div>

  <!-- ══════════════════════════════════════════════════════════
       MAIN CONTENT
       ══════════════════════════════════════════════════════════ -->
  <main class="main-content" id="main-content">

    <!-- ── TAB 1: AI ASSISTANT ──────────────────────────────── -->
    <section class="tab-panel active" id="panel-assistant"
             role="tabpanel" aria-labelledby="tab-assistant" tabindex="0">

      <div class="chat-container">

        <!-- Message History -->
        <div class="chat-messages" id="chat-messages" role="log" aria-label="Chat conversation" aria-live="polite">
          <!-- Welcome screen -->
          <div class="chat-welcome" aria-label="Welcome screen">
            <div class="welcome-icon" aria-hidden="true">🤖</div>
            <h1>Hi! I'm VenueIQ</h1>
            <p>Your AI-powered guide for today's event.<br>Ask me anything about the venue, queues, or parking!</p>

            <div class="quick-prompts stagger-children" role="list" aria-label="Quick questions">
              <button class="quick-prompt-btn" role="listitem"
                      data-prompt="Which gate has the shortest queue right now?">
                <span class="material-symbols-rounded" aria-hidden="true">queue</span>
                Shortest queue
              </button>
              <button class="quick-prompt-btn" role="listitem"
                      data-prompt="Where is the nearest food stall from Section A?">
                <span class="material-symbols-rounded" aria-hidden="true">restaurant</span>
                Find food nearby
              </button>
              <button class="quick-prompt-btn" role="listitem"
                      data-prompt="What's the best time to leave to beat the post-match crowd?">
                <span class="material-symbols-rounded" aria-hidden="true">directions_run</span>
                Beat the crowd
              </button>
              <button class="quick-prompt-btn" role="listitem"
                      data-prompt="Are there any current alerts or venue closures I should know about?">
                <span class="material-symbols-rounded" aria-hidden="true">campaign</span>
                Current alerts
              </button>
            </div>
          </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
          <div class="live-status connected" id="live-status" aria-live="polite">
            <span class="live-dot" aria-hidden="true"></span>
            <span>Live data connected</span>
          </div>
          <div class="chat-input-wrapper">
            <label for="chat-input" class="sr-only">Ask VenueIQ a question</label>
            <input
              type="text"
              id="chat-input"
              class="chat-input"
              placeholder="Ask about gates, food, parking, crowd levels…"
              aria-label="Type your question here"
              autocomplete="off"
              spellcheck="false"
              maxlength="500"
            >
            <button id="send-btn" class="send-btn" aria-label="Send message" type="button">
              <span class="material-symbols-rounded" aria-hidden="true">send</span>
            </button>
          </div>
        </div>

      </div>
    </section>

    <!-- ── TAB 2: CROWD MAP ─────────────────────────────────── -->
    <!-- Content injected by heatmap.js -->
    <section class="tab-panel" id="panel-heatmap"
             role="tabpanel" aria-labelledby="tab-heatmap" tabindex="0">
    </section>

    <!-- ── TAB 3: LIVE DASHBOARD ────────────────────────────── -->
    <!-- Content injected by dashboard.js -->
    <section class="tab-panel" id="panel-dashboard"
             role="tabpanel" aria-labelledby="tab-dashboard" tabindex="0">
    </section>

  </main>

  <!-- ══════════════════════════════════════════════════════════
       TOAST NOTIFICATIONS
       ══════════════════════════════════════════════════════════ -->
  <div class="toast-container" id="toast-container"
       role="region" aria-label="Notifications" aria-live="polite"></div>

  <!-- ══════════════════════════════════════════════════════════
       FIREBASE SDK (Google Service — loaded from CDN)
       Used only when DEMO_MODE is false in config.js
       ══════════════════════════════════════════════════════════ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- ══════════════════════════════════════════════════════════
       APP SCRIPTS (load order matters)
       ══════════════════════════════════════════════════════════ -->
  <!-- User config — silently skipped if missing (demo mode kicks in) -->
  <script src="config.js" onerror="console.info('[VenueIQ] config.js not found — using demo mode')"></script>

  <!-- Core modules -->
  <script src="js/firebase.js"></script>
  <script src="js/gemini.js"></script>
  <script src="js/simulator.js"></script>
  <script src="js/heatmap.js"></script>
  <script src="js/dashboard.js"></script>

  <!-- Main coordinator — must load last -->
  <script src="js/app.js"></script>

</body>
</html>
