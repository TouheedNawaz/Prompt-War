# nginx config for VenueIQ on Cloud Run
# Listens on port 8080 as required by Cloud Run

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Charset
    charset utf-8;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(css|js|svg|png|jpg|ico|woff2)$ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # Block direct access to config.js (it may contain API keys)
    location = /config.js {
        # Served via the docker-entrypoint.sh with env vars
        # Still accessible to the browser (client-side app needs it)
        expires -1;
        add_header Cache-Control "no-store, no-cache";
    }

    # Health check endpoint for Cloud Run
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # All routes fall back to index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
